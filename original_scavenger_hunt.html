<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Worksheet Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        .setup-area {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .setup-area h1 {
            margin-top: 0;
        }
        .input-section {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
        }
        .options {
            margin: 15px 0;
        }
        .checkbox-group {
            margin: 10px 0;
        }
        .checkbox-group label {
            display: inline;
            margin-right: 20px;
            font-weight: normal;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="setup-area">
        <h1>Arithmetic Worksheet Generator</h1>
        
        <div class="input-section">
            <label for="sentence">Enter a sentence to encode:</label>
            <textarea id="sentence" placeholder="Type your sentence here..."></textarea>
        </div>
        
        <div class="options">
            <div class="checkbox-group">
                <label><strong>Problem Types:</strong></label><br>
                <label><input type="checkbox" id="useAddition" checked> Addition</label>
                <label><input type="checkbox" id="useSubtraction"> Subtraction</label>
                <label><input type="checkbox" id="useMultiplication"> Multiplication</label>
                <label><input type="checkbox" id="useDivision"> Division</label>
            </div>
            
            <div class="checkbox-group">
                <label><strong>Mapping:</strong></label><br>
                <label><input type="radio" name="mapping" value="forward" checked> Forward (A=1, B=2, ..., Z=26)</label><br>
                <label><input type="radio" name="mapping" value="reverse"> Reverse (A=26, B=25, ..., Z=1)</label><br>
                <label><input type="radio" name="mapping" value="random"> Random (shuffled)</label>
                <button type="button" onclick="reshuffleRandom()" style="margin-left:10px;padding:4px 12px;font-size:0.85em;">&#x1F500; Reshuffle</button>
            </div>
            <div id="mappingDisplay" style="margin-top:10px;display:none;">
                <strong style="font-size:0.85em;">Current random mapping:</strong>
                <div id="mappingGrid" style="display:grid;grid-template-columns:repeat(13,1fr);gap:4px;margin-top:6px;font-size:0.8em;font-family:monospace;"></div>
            </div>
        </div>
        
        <button onclick="generateWorksheet()">Generate Worksheet</button>
    </div>

    <script>
        // Random mapping state
        let randomMap = {};
        function buildRandomMap() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const nums = Array.from({length:26},(_,i)=>i+1);
            for (let i=nums.length-1;i>0;i--) {
                const j=Math.floor(Math.random()*(i+1));
                [nums[i],nums[j]]=[nums[j],nums[i]];
            }
            letters.forEach((l,i)=>{ randomMap[l]=nums[i]; });
            renderRandomGrid();
        }
        function reshuffleRandom() {
            buildRandomMap();
        }
        function renderRandomGrid() {
            const grid = document.getElementById('mappingGrid');
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            // Sort by number so user scans 1,2,3...
            const sorted = letters.slice().sort((a,b) => randomMap[a] - randomMap[b]);
            grid.innerHTML = sorted.map(l =>
                `<div style="text-align:center;padding:4px 2px;background:#f0f4ff;border:1px solid #c8d8f8;border-radius:4px;">
                    <div style="font-weight:bold;color:#2980b9;">${randomMap[l]}</div>
                    <div style="color:#1a1a2e;">${l}</div>
                </div>`
            ).join('');
        }
        // Show/hide random grid when radio changes
        document.addEventListener('change', function(e) {
            if (e.target.name === 'mapping') {
                const display = document.getElementById('mappingDisplay');
                if (e.target.value === 'random') {
                    if (Object.keys(randomMap).length === 0) buildRandomMap();
                    display.style.display = 'block';
                } else {
                    display.style.display = 'none';
                }
            }
        });
        // Initialise
        buildRandomMap();

        function letterToNumber(letter, mapping = 'forward') {
            const upper = letter.toUpperCase();
            if (upper < 'A' || upper > 'Z') return null;
            if (mapping === 'random') return randomMap[upper];
            const position = upper.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
            return mapping === 'reverse' ? 27 - position : position;
        }
        
        function numberToLetter(num, mapping = 'forward') {
            if (mapping === 'random') {
                const entry = Object.entries(randomMap).find(([l,n])=>n===num);
                return entry ? entry[0] : '?';
            }
            if (mapping === 'reverse') num = 27 - num;
            return String.fromCharCode('A'.charCodeAt(0) + num - 1);
        }
        
        function generateProblem(targetNumber, useAddition, useSubtraction, useMultiplication, useDivision) {
            const types = [];
            if (useAddition) types.push('addition');
            if (useSubtraction) types.push('subtraction');
            if (useMultiplication) types.push('multiplication');
            if (useDivision) types.push('division');
            if (types.length === 0) types.push('addition');
            
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'addition') {
                const a = Math.floor(Math.random() * Math.min(targetNumber, 20)) + 1;
                const b = targetNumber - a;
                return {
                    num1: a,
                    num2: b,
                    operator: '+',
                    answer: targetNumber
                };
            } else if (type === 'subtraction') {
                const a = targetNumber + Math.floor(Math.random() * 20) + 1;
                const b = a - targetNumber;
                return {
                    num1: a,
                    num2: b,
                    operator: '-',
                    answer: targetNumber
                };
            } else if (type === 'multiplication') {
                // Find factors of targetNumber
                const factors = [];
                for (let i = 2; i <= Math.sqrt(targetNumber); i++) {
                    if (targetNumber % i === 0) {
                        factors.push([i, targetNumber / i]);
                    }
                }
                // Also include 1 * targetNumber as a fallback
                factors.push([1, targetNumber]);
                
                // Pick a random factor pair
                const pair = factors[Math.floor(Math.random() * factors.length)];
                
                return {
                    num1: pair[0],
                    num2: pair[1],
                    operator: '×',
                    answer: targetNumber
                };
            } else { // division
                // Generate a × targetNumber ÷ a = targetNumber
                const divisor = Math.floor(Math.random() * 10) + 2; // divisor between 2 and 11
                const dividend = targetNumber * divisor;
                return {
                    num1: dividend,
                    num2: divisor,
                    operator: '÷',
                    answer: targetNumber
                };
            }
        }
        
        function generateWorksheet() {
            const sentence = document.getElementById('sentence').value.trim();
            if (!sentence) {
                alert('Please enter a sentence first!');
                return;
            }
            
            const useAddition = document.getElementById('useAddition').checked;
            const useSubtraction = document.getElementById('useSubtraction').checked;
            const useMultiplication = document.getElementById('useMultiplication').checked;
            const useDivision = document.getElementById('useDivision').checked;
            const mapping = document.querySelector('input[name="mapping"]:checked').value;
            
            if (!useAddition && !useSubtraction && !useMultiplication && !useDivision) {
                alert('Please select at least one problem type!');
                return;
            }
            
            // Generate the worksheet HTML
            let problemsHTML = '';
            
            // Generate problems for each character
            for (let char of sentence) {
                const num = letterToNumber(char, mapping);
                
                if (num !== null) {
                    // It's a letter - generate a problem
                    const problem = generateProblem(num, useAddition, useSubtraction, useMultiplication, useDivision);
                    
                    problemsHTML += `
                        <div class="problem-box">
                            <div class="problem-vertical">
                                <div>${problem.num1}</div>
                                <div>${problem.operator} ${problem.num2}</div>
                            </div>
                            <div class="answer-line"></div>
                            <div class="letter-line">Letter: ___</div>
                        </div>
                    `;
                } else if (char === ' ') {
                    // Space
                    problemsHTML += `
                        <div class="problem-box space-box">
                            <div class="space-indicator">(space)</div>
                        </div>
                    `;
                } else {
                    // Punctuation or other character
                    problemsHTML += `
                        <div class="problem-box">
                            <div style="font-size: 24px; font-weight: bold;">${char}</div>
                        </div>
                    `;
                }
            }
            
            // Generate mapping table HTML
            const mappingTableHTML = generateMappingTableHTML(mapping);
            
            // Create the complete worksheet HTML
            const worksheetHTML = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Practice Worksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        .worksheet-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .problems-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: flex-start;
        }
        .problem-box {
            text-align: center;
            min-width: 80px;
        }
        .problem-vertical {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            line-height: 1.3;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            margin-bottom: 8px;
            text-align: right;
            display: inline-block;
            min-width: 60px;
        }
        .answer-line {
            border-bottom: 2px solid #000;
            width: 80px;
            margin: 10px auto 5px auto;
        }
        .letter-line {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .space-box {
            min-width: 40px;
        }
        .space-indicator {
            font-size: 14px;
            color: #999;
        }
        .mapping-table {
            margin-top: 50px;
            border-top: 3px solid #000;
            padding-top: 20px;
        }
        .mapping-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        .print-button {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        @media print {
            .print-button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="print-button">
        <button onclick="window.print()">Print Worksheet</button>
    </div>
    
    <div class="worksheet-title">Arithmetic Practice Worksheet</div>
    <div class="problems-container">
        ${problemsHTML}
    </div>
    
    <div class="mapping-table">
        <div class="mapping-title">Number-Letter Key (find your answer, read the letter):</div>
        ${mappingTableHTML}
    </div>
</body>
</html>
            `;
            
            // Open in new window
            const newWindow = window.open('', '_blank');
            newWindow.document.write(worksheetHTML);
            newWindow.document.close();
        }
        
        function generateMappingTableHTML(mapping) {
            let html = '<table>';
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            // Build pairs sorted by number so solver can scan 1,2,3...
            const pairs = letters.split('').map(l => ({ letter: l, number: letterToNumber(l, mapping) }));
            pairs.sort((a, b) => a.number - b.number);
            for (let i = 0; i < pairs.length; i++) {
                if (i % 13 === 0) html += '<tr>';
                html += `<td style="width:7.7%;text-align:center;border:1px solid #ccc;padding:5px;"><strong>${pairs[i].number}</strong> = ${pairs[i].letter}</td>`;
                if (i % 13 === 12 || i === pairs.length - 1) html += '</tr>';
            }
            html += '</table>';
            return html;
        }
    </script>
</body>
</html>
