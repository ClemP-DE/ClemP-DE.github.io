<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Worksheet Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        .setup-area {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .setup-area h1 {
            margin-top: 0;
        }
        .input-section {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
        }
        .options {
            margin: 15px 0;
        }
        .checkbox-group {
            margin: 10px 0;
        }
        .checkbox-group label {
            display: inline;
            margin-right: 20px;
            font-weight: normal;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        
        /* Printable worksheet styles */
        .worksheet {
            margin-top: 30px;
            page-break-after: always;
        }
        .worksheet-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .problems-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: flex-start;
        }
        .problem-box {
            text-align: center;
            min-width: 80px;
        }
        .problem-vertical {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            line-height: 1.3;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
            margin-bottom: 8px;
            text-align: right;
            display: inline-block;
            min-width: 60px;
        }
        .answer-line {
            border-bottom: 2px solid #000;
            width: 80px;
            margin: 10px auto 5px auto;
        }
        .letter-line {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .space-box {
            min-width: 40px;
        }
        .space-indicator {
            font-size: 14px;
            color: #999;
        }
        
        .mapping-table {
            margin-top: 50px;
            border-top: 3px solid #000;
            padding-top: 20px;
        }
        .mapping-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        
        @media print {
            .setup-area {
                display: none;
            }
            .no-print {
                display: none;
            }
            body {
                margin: 0;
                padding: 20px;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="setup-area">
        <h1>Arithmetic Worksheet Generator</h1>
        
        <div class="input-section">
            <label for="sentence">Enter a sentence to encode:</label>
            <textarea id="sentence" placeholder="Type your sentence here..."></textarea>
        </div>
        
        <div class="options">
            <div class="checkbox-group">
                <label><strong>Problem Types:</strong></label><br>
                <label><input type="checkbox" id="useAddition" checked> Addition</label>
                <label><input type="checkbox" id="useSubtraction"> Subtraction</label>
            </div>
            
            <div class="checkbox-group">
                <label><strong>Mapping:</strong></label><br>
                <label><input type="radio" name="mapping" value="forward" checked> Forward (A=1, B=2, ..., Z=26)</label><br>
                <label><input type="radio" name="mapping" value="reverse"> Reverse (A=26, B=25, ..., Z=1)</label>
            </div>
        </div>
        
        <button onclick="generateWorksheet()">Generate Worksheet</button>
        <button onclick="window.print()" class="no-print" id="printButton" style="display:none;">Print Worksheet</button>
    </div>

    <div id="worksheet" class="worksheet hidden">
        <div class="worksheet-title">Arithmetic Practice Worksheet</div>
        <div class="problems-container" id="problemsContainer"></div>
        
        <div class="mapping-table">
            <div class="mapping-title">Letter-Number Mapping:</div>
            <table id="mappingTable"></table>
        </div>
    </div>

    <script>
        function letterToNumber(letter, reverse = false) {
            const upper = letter.toUpperCase();
            if (upper < 'A' || upper > 'Z') return null;
            const position = upper.charCodeAt(0) - 'A'.charCodeAt(0) + 1;
            return reverse ? 27 - position : position;
        }
        
        function numberToLetter(num, reverse = false) {
            if (reverse) {
                num = 27 - num;
            }
            return String.fromCharCode('A'.charCodeAt(0) + num - 1);
        }
        
        function generateProblem(targetNumber, useAddition, useSubtraction) {
            const types = [];
            if (useAddition) types.push('addition');
            if (useSubtraction) types.push('subtraction');
            if (types.length === 0) types.push('addition');
            
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'addition') {
                const a = Math.floor(Math.random() * Math.min(targetNumber, 20)) + 1;
                const b = targetNumber - a;
                return {
                    num1: a,
                    num2: b,
                    operator: '+',
                    answer: targetNumber
                };
            } else {
                const a = targetNumber + Math.floor(Math.random() * 20) + 1;
                const b = a - targetNumber;
                return {
                    num1: a,
                    num2: b,
                    operator: '-',
                    answer: targetNumber
                };
            }
        }
        
        function generateWorksheet() {
            const sentence = document.getElementById('sentence').value.trim();
            if (!sentence) {
                alert('Please enter a sentence first!');
                return;
            }
            
            const useAddition = document.getElementById('useAddition').checked;
            const useSubtraction = document.getElementById('useSubtraction').checked;
            const mapping = document.querySelector('input[name="mapping"]:checked').value;
            const isReverse = mapping === 'reverse';
            
            if (!useAddition && !useSubtraction) {
                alert('Please select at least one problem type!');
                return;
            }
            
            const container = document.getElementById('problemsContainer');
            container.innerHTML = '';
            
            // Generate problems for each character
            for (let char of sentence) {
                const num = letterToNumber(char, isReverse);
                
                if (num !== null) {
                    // It's a letter - generate a problem
                    const problem = generateProblem(num, useAddition, useSubtraction);
                    
                    const problemBox = document.createElement('div');
                    problemBox.className = 'problem-box';
                    problemBox.innerHTML = `
                        <div class="problem-vertical">
                            <div>${problem.num1}</div>
                            <div>${problem.operator} ${problem.num2}</div>
                        </div>
                        <div class="answer-line"></div>
                        <div class="letter-line">Letter: ___</div>
                    `;
                    container.appendChild(problemBox);
                } else if (char === ' ') {
                    // Space
                    const spaceBox = document.createElement('div');
                    spaceBox.className = 'problem-box space-box';
                    spaceBox.innerHTML = '<div class="space-indicator">(space)</div>';
                    container.appendChild(spaceBox);
                } else {
                    // Punctuation or other character
                    const punctBox = document.createElement('div');
                    punctBox.className = 'problem-box';
                    punctBox.innerHTML = `<div style="font-size: 24px; font-weight: bold;">${char}</div>`;
                    container.appendChild(punctBox);
                }
            }
            
            // Generate mapping table
            generateMappingTable(isReverse);
            
            // Show worksheet and print button
            document.getElementById('worksheet').classList.remove('hidden');
            document.getElementById('printButton').style.display = 'inline-block';
            
            // Scroll to worksheet
            document.getElementById('worksheet').scrollIntoView({ behavior: 'smooth' });
        }
        
        function generateMappingTable(isReverse) {
            const table = document.getElementById('mappingTable');
            table.innerHTML = '';
            
            // Create header row
            const headerRow = document.createElement('tr');
            const headerCell1 = document.createElement('th');
            headerCell1.textContent = 'Letter';
            const headerCell2 = document.createElement('th');
            headerCell2.textContent = 'Number';
            headerRow.appendChild(headerCell1);
            headerRow.appendChild(headerCell2);
            table.appendChild(headerRow);
            
            // Create rows for A-Z
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let currentRow = null;
            
            for (let i = 0; i < letters.length; i++) {
                if (i % 13 === 0) {
                    currentRow = document.createElement('tr');
                    table.appendChild(currentRow);
                }
                
                const letter = letters[i];
                const number = letterToNumber(letter, isReverse);
                
                const cell = document.createElement('td');
                cell.innerHTML = `<strong>${letter}</strong> = ${number}`;
                cell.style.width = '7.7%';
                currentRow.appendChild(cell);
            }
        }
    </script>
    <script data-goatcounter="https://clemp.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
